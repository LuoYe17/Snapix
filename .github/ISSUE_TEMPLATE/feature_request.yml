name: 功能建议
description: 建议一个新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 别一开始就给方案，先说清楚痛点。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的交互流程
      description: 描述你理想中的使用流程或界面。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 现有方案为什么不行
      description: 现在用的工具或绕路方案是什么、哪里不满意。
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 这个功能符合 Snapix 的定位吗
      description: |
        Snapix 的定位是"普通用户的极致轻量截图工具"。
        如果建议的功能会显著增加体积或复杂度，请说明它为什么值得。
      options:
        - 是，核心截图体验直接相关
        - 是，可选功能，不增加默认体验复杂度
        - 不确定，希望讨论
    validations:
      required: true
