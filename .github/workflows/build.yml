name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build
        run: dotnet build src/Snapix/Snapix.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapix
          path: src/Snapix/bin/Release/net48/Snapix.exe
