name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本标签（如 v0.2.0）'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build (Release)
        run: dotnet build src/Snapix/Snapix.csproj -c Release

      - name: Stage release files
        shell: pwsh
        run: |
          $stage = "release"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "src/Snapix/bin/Release/net48/Snapix.exe" "$stage/Snapix.exe"
          Copy-Item "LICENSE" "$stage/"
          Copy-Item "README.md" "$stage/"

      - name: Create zip
        shell: pwsh
        run: |
          $tag = if ('${{ github.event.inputs.tag }}') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          $zipName = "Snapix-$tag.zip"
          Compress-Archive -Path release/* -DestinationPath $zipName
          Write-Host "Created $zipName"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP_NAME }}
            release/Snapix.exe
